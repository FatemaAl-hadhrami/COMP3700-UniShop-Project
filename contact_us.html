<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - UniShop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-logo">
      <a href="index.html">
        <img src="UniShop_logo.png" alt="UniShop - Your Campus Store" />
      </a>
    </div>
    <div class="header-search">
      <form action="https://httpbin.org/get" method="get">
        <input type="text" name="query" />
        <input type="submit" value="Search" />
      </form>
    </div>
    <div class="header-actions">
      <a href="login_and_registration.html">Login / Register</a>
      <a href="cart.html" class="cart-link" style="font-size:26px; position:relative; padding:4px;">
        🛒
        <span class="cart-count">0</span>
      </a>
    </div>
    </header>
    <div class="site-header">
        <nav class="navbar">
            <a href="index.html">Home</a>
            <a href="About_us.html">About Us</a>
            <a href="academic_supplies.html">Academic Supplies</a>
            <a href="medical-items.html">Medical & Laboratory Items</a>
            <a href="contact_us.html">Contact Us</a>
            <a href="cart.html">My cart</a>
            <a href="login_and_registration.html">Login</a>
            <a href="order_tracking.html">Order Tracking</a>
        </nav>
        <div class="header-container">
            <h2 class="brand-name">UniShop</h2>
            <div class="logo"></div>
        </div>
    </div>

    <div class="contact-footer-info" style="text-align: center; margin: 20px 0; font-family: Arial, sans-serif;">
        <p style="margin: 5px 0;"><strong>Email:</strong> support@unishop.com</p>
        <p style="margin: 5px 0;"><strong>Phone:</strong> +968 2414 0000</p>
    </div>

        <div class="contact-form">
            <form action="https://httpbin.org/get" method="get">
                <fieldset>
                    <legend>Contact Form</legend>
                    <input type="text" name="name" placeholder="Full Name" required>
                    <textarea name="message" rows="2" placeholder="Your Message"></textarea>
                    <input type="submit" value="Send Message">
                </fieldset>
            </form>
        </div>
    </div>

    <div style="padding: 0 40px;">
        <table class="custom-table" style="margin: 10px auto; font-size: 12px;">
            <tr><th>Day</th><th>Hours</th></tr>
            <tr><td>Sun-Thu</td><td>08:00 AM - 08:00 PM</td></tr>
        </table>
    </div>

    <footer class="site-footer">
        <p>&copy; 2026 UniShop</p>
    </footer>
</body>
</html>
