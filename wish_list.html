<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wish List</title>
         <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" 
integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
crossorigin="anonymous">
 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" 
crossorigin="anonymous"></script>
<script type="text/javascript">
    // constructor for academic items
    function AcademicItem(name, price){
        this.name = name;
        this.price=price;
    }
    // constructor for medical items
    function MedicalItem(name,price){
            this.name = name;
        this.price=price;
    }
    // array to store academic items
    let academicItems =[
        new AcademicItem("Pens",0.650),
            new AcademicItem("Single book",0.800),
              new AcademicItem("Notebooks",1.200)
         
   
   ];
   // array to store medical items
   let medicalItems = [
    new MedicalItem("labcoat",15.000),
    new MedicalItem("scrubs",10.000),
new MedicalItem("stethoscope",10.000)
   ];
   //Function to Display the academic items in the table
   function displayAcademicItems(data=academicItems){
    let table=document.getElementById("academicTable");
    // Clear previous table content
    table.innerHTML="";
    // loop through the array and add rows to the table
    for(let i=0;i<data.length;i++){
        table.innerHTML +=
        "<tr>" +
           "<td>"+ data[i].name + "</td>"+
           "<td>"+ data[i].price + "</td>"+
            "</tr>";
            
    }
   }
      //Function to Display the medical items in the table

    function displayMedicalItems(data=medicalItems){
    let table=document.getElementById("medicalTable");

     // Clear previous table content
    table.innerHTML="";

     // loop through the array and add rows to the table
    for(let i=0;i<data.length;i++){
        table.innerHTML+=
       "<tr>" +
           "<td>"+ data[i].name + "</td>" +
           "<td>"+ data[i].price + "</td>"+
            "</tr>";
   }

}
   // Function to search for academic items based on the user's input
   function searchAcademicItems(){
    // get the user's input and convert it to lower case
    let value =document.getElementById("academicSearch").value.toLowerCase();
       // If the inpt is empty show all the items
    if(value ===""){
        displayAcademicItems(academicItems);
        return;
    }
    let filtered = [];
    // loop through the items and find matches
    for(let i=0;i<academicItems.length;i++){
        let name=academicItems[i].name.toLowerCase();
        if(name.indexOf(value)!=-1){
            filtered.push(academicItems[i]);
        }
    
    
    }
    //Display the filtered results
    displayAcademicItems(filtered);
   }

      // Function to search for medical items based on the user's input
      function searchMedicalItems(){

            // get the user's input and convert it to lower case
    let value =document.getElementById("medicalSearch").value.toLowerCase();

    // If the input is empty show all the items
    if(value ===""){
        displayMedicalItems(medicalItems);
        return;
    }
    let filtered = [];

        // loop through the items and find matches
    for(let i=0;i<medicalItems.length;i++){
        let name=medicalItems[i].name.toLowerCase();
       
        if(name.indexOf(value)!=-1){
            filtered.push(medicalItems[i]);
        }
    
    
    }
        //Display the filtered results

    displayMedicalItems(filtered);
   }
   // function to add new academic item to the array
   function addAcademicItem(){
    let name = document.getElementById("academicName").value;
    let price = parseFloat(document.getElementById("academicPrice").value);
    //validate user input
    if (name==="" || isNaN(price)){
        alert("Please fill all the academic item fields");
        return;
    }
    //add new item to the array
    academicItems.push(new AcademicItem(name,price));
    
    // update the table
    displayAcademicItems();
    // clear the input fields
    document.getElementById("academicName").value="";
     document.getElementById("academicPrice").value="";
     
   }

    // function to add new medical item to the array
   function addMedicalItem(){
    let name = document.getElementById("medicalName").value;
    let price = parseFloat(document.getElementById("medicalPrice").value);
      
    //validate user input
    if (name==="" || isNaN(price)){
        alert("Please fill all the medical item fields");
        return;
    }
        
    //add new item to the array
    medicalItems.push(new MedicalItem(name,price));
    // update the table
    displayMedicalItems();
    // clear the input fields
    document.getElementById("medicalName").value="";
     document.getElementById("medicalPrice").value="";
     
   }
   // Display all the items when the page loads
   displayAcademicItems(academicItems);
   displayMedicalItems(medicalItems);
</script>
</head>
<body>
    <h1 class="text-center mb-4">My Wish List</h1>
    <p class="text-center">Here you can search, view and add items to your personal wishlist!🌠 </p>

  <div class="container my-4">
    <h2 class="mb-3">Academic Supplies</h2>
   <input type="text" id="academicSearch" class="form-control mb-3" placeholder="Search academic items">
    <button class="btn btn-primary mt-2" onclick="searchAcademicItems()">Search</button>
   <table class="table table-bordered table-striped">
     <thead class="table-primary">
     <tr>
        <th>Name</th>
        <th>Price</th>
     </tr>
     </thead>
 
        <tbody id="academicTable"></tbody>

    </table>
  <h4 class="mt-4">Add academic item</h4>
   <input type="text" id="academicName" class="form-control mb-2" placeholder="Item name">
    <input type="text" id="academicPrice" class="form-control mb-2" placeholder="Item price">
    <button class="btn btn-primary" onclick="addAcademicItem()">Add Academic Item to wish list</button>
</div>
<div class="container my-4">
    <h2 class="mb-3"> Medical and Laboratory Items</h2>
   <input type="text" id="medicalSearch" class="form-control mb-3" placeholder="Search medical and laboratory items">
       <button class="btn btn-success mt-2" onclick="searchMedicalItems()">Search Medical and laboratory items</button>

   <table class="table table-bordered table-striped">
     <thead class="table-success">
     <tr>
        <th>Name</th>
        <th>Price</th>
     </tr>
     </thead>
 
        <tbody id="medicalTable"></tbody>

    </table>
  <h4 class="mt-4">Add Medical item</h4>
   <input type="text" id="medicalName" class="form-control mb-2" placeholder="Item name">
    <input type="text" id="medicalPrice" class="form-control mb-2" placeholder="Item price">
    <button class="btn btn-success" onclick="addMedicalItem()">Add Medical Item to wish list</button>
</div>

</body>
</html>
