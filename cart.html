<!-- ================= CART ================= -->
<div class="container mt-5">

  <h2 class="text-center text-primary mb-4">My Cart</h2>

  <!-- SEARCH -->
  <div class="row mb-2">
    <div class="col-md-6 offset-md-3">
      <input type="text" id="searchInput" class="form-control" placeholder="Search product...">
    </div>
  </div>

  <!-- MESSAGE -->
  <p id="searchMessage" class="text-center text-danger fw-bold"></p>

  <!-- ADD PRODUCT -->
  <div class="row mb-4 text-center">
    <div class="col-md-3">
      <input type="text" id="name" class="form-control" placeholder="Product Name">
    </div>

    <div class="col-md-3">
      <input type="number" id="price" class="form-control" placeholder="Price">
    </div>

    <div class="col-md-3">
      <input type="number" id="qty" class="form-control" placeholder="Qty">
    </div>

    <div class="col-md-3">
      <button class="btn btn-success w-100" onclick="addProduct()">Add</button>
    </div>
  </div>

  <!-- TABLE -->
  <table class="table table-bordered text-center">
    <thead class="table-primary">
      <tr>
        <th>Product</th>
        <th>Price</th>
        <th>Qty</th>
        <th>Total</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody id="cartTable"></tbody>
  </table>

  <h4 class="text-end">
    Grand Total: <span id="grandTotal">0</span> OMR
  </h4>

</div>

<!-- ================= FOOTER ================= -->

<!-- ================= JS ================= -->
<script>

// ===============================
// Constructor
// ===============================
function Product(name, price, qty) {
  this.name = name;
  this.price = price;
  this.qty = qty;
}

// CART ARRAY
// ===============================
let cart = [
  new Product("Labcoat", 15, 1),
  new Product("Calculator", 4, 2)
];

// DISPLAY CART
// ===============================
function displayCart(data = cart) {

  let table = document.getElementById("cartTable");
  table.innerHTML = "";

  let total = 0;

  data.forEach((item, index) => {

    let itemTotal = item.price * item.qty;
    total += itemTotal;

    table.innerHTML += `
      <tr>
        <td>${item.name}</td>
        <td>${item.price}</td>
        <td>${item.qty}</td>
        <td>${itemTotal}</td>
        <td>
          <button class="btn btn-danger btn-sm" onclick="deleteItem(${index})">
            Delete
          </button>
        </td>
      </tr>
    `;
  });

  document.getElementById("grandTotal").innerText = total;
  document.getElementById("cartCount").innerText = cart.length;
}

// ADD PRODUCT
// ===============================
function addProduct() {

  let name = document.getElementById("name").value;
  let price = parseFloat(document.getElementById("price").value);
  let qty = parseInt(document.getElementById("qty").value);

  if (!name || !price || !qty) {
    alert("Please fill all fields");
    return;
  }

  cart.push(new Product(name, price, qty));

  displayCart();

  document.getElementById("name").value = "";
  document.getElementById("price").value = "";
  document.getElementById("qty").value = "";
}

// DELETE
// ===============================
function deleteItem(index) {
  cart.splice(index, 1);
  displayCart();
}
  
// SEARCH FUNCTION
// ===============================
function searchCart() {

  let value = document.getElementById("searchInput").value.toLowerCase();
  let message = document.getElementById("searchMessage");

  let filtered = cart.filter(item =>
    item.name.toLowerCase().includes(value)
  );

  if (value === "") {
    message.innerText = "";
    displayCart(cart);
    return;
  }

  if (filtered.length === 0) {
    message.innerText = "❌ No products found in cart";
  } else {
    message.innerText = "";
  }

  displayCart(filtered);
}

// LIVE SEARCH
// ===============================
document.getElementById("searchInput").addEventListener("input", searchCart);

// ENTER KEY SEARCH
// ===============================
document.getElementById("searchInput").addEventListener("keydown", function(e) {

  if (e.key === "Enter") {
    e.preventDefault();
    searchCart();
  }
});

// INIT
displayCart();

</script>
