<!-- Main Fun Content -->
<div class="container mt-5">
  <h2 class="mb-4 text-center text-primary">Arrange the Words to Form a Correct Sentence!</h2>
  
  <p class="lead text-center">Drag the words below to arrange them in correct order:</p>
  
  <div id="word-buttons" class="d-flex flex-wrap justify-content-center mb-3">
    <!-- Buttons for words will be generated by JavaScript -->
  </div>

  <div class="mb-3 text-center">
    <button id="check-btn" class="btn btn-success me-2">Check Answer</button>
    <button id="reset-btn" class="btn btn-warning">Reset</button>
  </div>

  <div id="result" class="text-center fs-5 mt-3"></div>
</div>

<!-- JavaScript for interaction -->
<script>
/* Fun Page JS - Arrange words game */

// Correct sentence words
const correctSentence = ["UniShop", "offers", "the", "best", "academic", "supplies"];
let shuffledWords = [...correctSentence]; // clone array
let userSelection = [];

// Shuffle function
function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

// Generate buttons for words
function renderButtons() {
  const container = document.getElementById("word-buttons");
  container.innerHTML = "";
  shuffledWords.forEach((word, idx) => {
    const btn = document.createElement("button");
    btn.textContent = word;
    btn.className = "btn btn-outline-primary m-2";
    btn.onclick = () => selectWord(idx);
    container.appendChild(btn);
  });
}

// When user clicks a word
function selectWord(idx) {
  const word = shuffledWords[idx];
  userSelection.push(word);
  shuffledWords.splice(idx, 1); // remove from shuffledWords
  renderButtons();
  showSelection();
}

// Show user's selected words
function showSelection() {
  const container = document.getElementById("result");
  container.textContent = "Your sentence: " + userSelection.join(" ");
}

// Check user's answer
document.getElementById("check-btn").onclick = () => {
  if (userSelection.join(" ") === correctSentence.join(" ")) {
    document.getElementById("result").textContent = "🎉 Correct! Well done!";
    document.getElementById("result").classList.add("text-success");
  } else {
    document.getElementById("result").textContent = "❌ Incorrect. Try again!";
    document.getElementById("result").classList.add("text-danger");
  }
};

// Reset game
document.getElementById("reset-btn").onclick = () => {
  shuffledWords = [...correctSentence];
  userSelection = [];
  shuffleArray(shuffledWords);
  renderButtons();
  document.getElementById("result").textContent = "";
  document.getElementById("result").classList.remove("text-danger", "text-success");
};

// Initialize
shuffleArray(shuffledWords);
renderButtons();
</script>
