<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login & Register - UniShop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-logo">
      <a href="index.html">
        <img src="images/UniShop_logo.png" alt="UniShop - Your Campus Store" />
      </a>
    </div>
    <div class="header-search">
      <form action="https://httpbin.org/get" method="get">
        <input type="text" name="query" />
        <input type="submit" value="Search" />
      </form>
    </div>
    <div class="header-actions">
      <a href="login_and_registration.html">Login / Register</a>
      <a href="cart.html" class="cart-link" style="font-size:26px; position:relative; padding:4px;">
        🛒
        <span class="cart-count">0</span>
      </a>
    </div>
    </header>
    <div class="site-header">
<nav class="navbar">
            <a href="index.html">Home</a>
    
            <a href="About_us.html">About Us</a>
           
            <a href="academic_supplies.html">Academic Supplies</a>
           
            <a href="medical-items.html">Medical & Laboratory Items</a>
          
            <a href="contact_us.html">Contact Us</a>
            <a href="cart.html">My cart</a>
            <a href="login_and_registration.html">Login</a>
            <a href="order_tracking.html">Order Tracking</a>
        </nav>
        <div class="header-container">
            <h2 class="brand-name">UniShop</h2>
            <div class="logo"></div>
        </div>
    </div>

    <div class="main-container">
        <form action="https://httpbin.org/get" method="get">
            <fieldset>
                <legend>Login</legend>
                <label>Username:</label>
                <input type="text" name="username" required style="margin-bottom: 8px;">
                
                <label>Phone Number:</label>
                <input type="tel" name="phone" placeholder="968-XXXXXXXX" required style="margin-bottom: 8px;">
                
                <label>Password:</label>
                <input type="password" name="password" required style="margin-bottom: 12px;">
                
                <input type="submit" value="Login Now">
            </fieldset>
        </form>

  <div class="form-container-box">
    <form action="#">
        <fieldset>
            <legend>Registration</legend>
            <label>Full Name:</label>
            <input type="text" name="fullname">
            
            <label>College/Faculty:</label>
            <select name="college">
                <option>Engineering</option>
                <option>Science</option>
                <option>Medicine</option>
            </select>

            <label>Password:</label>
            <input type="password" name="pass">
            
            <label>Confirm Password:</label>
            <input type="password" name="confirm_pass">

            <label>
                <input type="checkbox" name="terms"> I agree to Terms & Conditions
            </label>
            
            <input type="submit" value="Register Account">
        </fieldset>
    </form>
  </div>

    <footer class="site-footer">
        <p>&copy; 2026 UniShop - Bright Minds Team</p>
    </footer>
</body>
