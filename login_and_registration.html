<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login & Register - UniShop</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" 
  integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-light">

  <!-- Header (from Academic page) -->
  <header class="container-fluid bg-white">
    <div class="row align-items-center p-4">
      <div class="col-md-2">
        <p class="h3 text-primary">UniShop</p>
        <a href="index.html">
          <img src="images/UniShop_logo.png" alt="UniShop - Your Campus Store" class="img-fluid" />
        </a>
      </div>
      <div class="col-md-6">
        <form action="https://httpbin.org/get" method="get">
          <div class="row">
            <div class="col-8">
              <input type="text" name="query" class="form-control" placeholder="Search..." />
            </div>
            <div class="col-4">
              <input type="submit" value="Search" class="btn btn-primary w-100" />
            </div>
          </div>
        </form>
      </div>
      <div class="col-md-4 text-end">
        <a href="login_and_registration.html" class="btn btn-outline-primary">Login / Register</a>
        <a href="cart.html" class="btn btn-outline-primary fs-4">🛒 <span class="text-danger">0</span></a>
      </div>
    </div>
  </header>

  <!-- Navbar (from Academic page) -->
  <nav class="navbar navbar-expand-sm bg-primary navbar-dark">
    <div class="container-fluid">
      <div class="navbar-nav">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link" href="About_us.html">About Us</a>
        <a class="nav-link" href="academic_supplies.html">Academic Supplies</a>
        <a class="nav-link" href="medical-items.html">Medical & Laboratory Items</a>
        <a class="nav-link" href="contact_us.html">Contact Us</a>
        <a class="nav-link" href="cart.html">My Cart</a>
        <a class="nav-link active" href="login_and_registration.html">Login</a>
        <a class="nav-link" href="order_tracking.html">Order Tracking</a>
        <a class="nav-link" href="questionnaire.html">Questionnaire</a>
        <a class="nav-link" href="calculator.html">Calculator</a>
        <a class="nav-link" href="funpage.html">Fun Page</a>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container mt-5 mb-5">
    <div class="row g-4">
      <!-- Login Form -->
      <div class="col-md-6">
        <div class="card shadow-sm">
          <div class="card-body">
            <h3 class="card-title mb-4">Login</h3>
            <form action="https://httpbin.org/get" method="get">
              <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Phone Number</label>
                <input type="tel" name="phone" class="form-control" placeholder="968-XXXXXXXX" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
              </div>
              <button type="submit" class="btn btn-primary w-100">Login Now</button>
            </form>
          </div>
        </div>
      </div>

      <!-- Registration Form -->
      <div class="col-md-6">
        <div class="card shadow-sm">
          <div class="card-body">
            <h3 class="card-title mb-4">Register</h3>
            <form action="#">
              <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" name="fullname" class="form-control">
              </div>
              <div class="mb-3">
                <label class="form-label">College/Faculty</label>
                <select name="college" class="form-select">
                  <option>Engineering</option>
                  <option>Science</option>
                  <option>Medicine</option>
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="pass" class="form-control">
              </div>
              <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                <input type="password" name="confirm_pass" class="form-control">
              </div>
              <div class="form-check mb-3">
                <input type="checkbox" name="terms" class="form-check-input" id="termsCheck">
                <label class="form-check-label" for="termsCheck">I agree to Terms & Conditions</label>
              </div>
              <button type="submit" class="btn btn-success w-100">Register Account</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer (from Academic page) -->
  <footer class="bg-primary text-white text-center py-3">
    <p class="mb-0">&copy; 2026 UniShop. All rights reserved.</p>
  </footer>

</body>
</html>
