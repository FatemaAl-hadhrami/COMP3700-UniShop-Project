<!-- ================= JAVASCRIPT VALIDATION ================= -->
<script>

// ===============================
// LOGIN VALIDATION (Rubric: advanced rules)
// ===============================
document.getElementById("loginForm").addEventListener("submit", function(e) {

  let username = document.getElementById("username").value.trim();
  let phone = document.getElementById("phone").value.trim();
  let password = document.getElementById("password").value;

  // Rule 1: Username must be at least 3 chars
  if (username.length < 3) {
    alert("❌ Username must be at least 3 characters");
    e.preventDefault();
    return;
  }

  // Rule 2: Phone must match Oman format
  let phonePattern = /^968\d{8}$/;
  if (!phonePattern.test(phone)) {
    alert("❌ Phone must be like 968XXXXXXXX");
    e.preventDefault();
    return;
  }

  // Rule 3: Password must include number + min 6 chars
  let passPattern = /^(?=.*\d).{6,}$/;
  if (!passPattern.test(password)) {
    alert("❌ Password must be at least 6 characters and include a number");
    e.preventDefault();
    return;
  }

  alert("✅ Login Successful!");
});


// ===============================
// REGISTER VALIDATION
// ===============================
document.getElementById("registerForm").addEventListener("submit", function(e) {

  let fullname = document.getElementById("fullname").value.trim();
  let college = document.getElementById("college").value;
  let pass = document.getElementById("regPassword").value;
  let confirm = document.getElementById("confirmPassword").value;
  let terms = document.getElementById("terms").checked;

  // Rule 1: Full name letters only
  let namePattern = /^[A-Za-z\s]{3,}$/;
  if (!namePattern.test(fullname)) {
    alert("❌ Full name must contain only letters (min 3 chars)");
    e.preventDefault();
    return;
  }

  // Rule 2: College must be selected
  if (college === "") {
    alert("❌ Please select your college");
    e.preventDefault();
    return;
  }

  // Rule 3: Password strength
  let passPattern = /^(?=.*\d).{6,}$/;
  if (!passPattern.test(pass)) {
    alert("❌ Password must be 6+ chars and include number");
    e.preventDefault();
    return;
  }

  // Rule 4: Confirm password match
  if (pass !== confirm) {
    alert("❌ Passwords do not match");
    e.preventDefault();
    return;
  }

  // Rule 5: Terms must be accepted
  if (!terms) {
    alert("❌ You must accept Terms & Conditions");
    e.preventDefault();
    return;
  }

  alert("✅ Registration Successful!");
});

</script>
